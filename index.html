<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metin Ozturk, PhD, SMIEEE</title>
<meta name="description" content="Metin Ozturk — Assistant Professor of Telecommunications. Wireless communications, non-terrestrial networks (NTN), HAPS, 6G, and AI.">
<link rel="icon" href="favicon.ico" type="image/x-icon">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root{
    --ink:#16202e;          /* primary text — deep atmospheric near-black */
    --ink-soft:#475467;     /* secondary text */
    --muted:#6b7886;        /* captions, meta */
    --sky-deep:#143a5e;     /* headings */
    --sky:#1f5c97;          /* links */
    --sky-bright:#2f7bc4;   /* hover / active */
    --horizon:#b9742b;      /* the single warm accent — used with restraint */
    --slate:#5b6b7d;        /* "under review" accent */
    --bg:#eef2f6;           /* page */
    --panel:#ffffff;        /* cards */
    --line:#dde4ec;         /* hairlines */
    --line-soft:#eaeff4;
    --shadow:0 1px 2px rgba(20,40,70,.04), 0 8px 28px -18px rgba(20,40,70,.28);
    --maxw:980px;
    --nav-h:60px;
    --serif:"Newsreader", Georgia, "Times New Roman", serif;
    --sans:"IBM Plex Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    --mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); font-size:16px; line-height:1.62;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  a{color:var(--sky); text-decoration:none;}
  a:hover{color:var(--sky-bright); text-decoration:underline; text-underline-offset:2px;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px;}

  /* ---------- top navigation ---------- */
  .nav{
    position:sticky; top:0; z-index:50;
    background:rgba(255,255,255,.86); backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    max-width:var(--maxw); margin:0 auto; padding:0 24px;
    height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .nav-name{
    font-family:var(--serif); font-weight:600; font-size:1.06rem; color:var(--sky-deep);
    letter-spacing:.2px; white-space:nowrap;
  }
  .nav-name a{color:inherit;}
  .nav-name a:hover{text-decoration:none; color:var(--sky);}
  .nav-links{display:flex; gap:2px; list-style:none; margin:0; padding:0;}
  .nav-links a{
    display:block; font-family:var(--mono); font-size:.72rem; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-soft); padding:8px 10px; border-radius:6px;
    position:relative;
  }
  .nav-links a:hover{color:var(--sky-deep); background:var(--line-soft); text-decoration:none;}
  .nav-links a.active{color:var(--sky-deep);}
  .nav-links a.active::after{
    content:""; position:absolute; left:10px; right:10px; bottom:2px; height:2px;
    background:var(--horizon); border-radius:2px;
  }
  .nav-toggle{
    display:none; background:none; border:1px solid var(--line); color:var(--sky-deep);
    width:40px; height:36px; border-radius:8px; font-size:1.1rem; cursor:pointer;
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative; overflow:hidden;
    background:
      radial-gradient(120% 90% at 80% -10%, rgba(47,123,196,.12), transparent 60%),
      linear-gradient(180deg, #f6f9fc 0%, var(--bg) 100%);
    border-bottom:1px solid var(--line);
  }
  /* faint atmosphere bands — the "altitude" signature */
  .hero::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:repeating-linear-gradient(180deg,
      transparent 0, transparent 62px,
      rgba(31,92,151,.05) 62px, rgba(31,92,151,.05) 63px);
    mask-image:linear-gradient(180deg, transparent, #000 30%, #000 70%, transparent);
  }
  .hero-grid{
    position:relative; display:grid; grid-template-columns:1fr auto; gap:40px;
    align-items:center; padding:54px 0 46px;
  }
  .eyebrow{
    font-family:var(--mono); font-size:.72rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--horizon); margin:0 0 14px; display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--horizon); display:inline-block;}
  .hero h1{
    font-family:var(--serif); font-weight:600; font-size:clamp(2.1rem,5vw,3.1rem);
    line-height:1.05; letter-spacing:-.01em; color:var(--sky-deep); margin:0 0 12px;
  }
  .hero .tagline{
    font-family:var(--mono); font-size:.82rem; letter-spacing:.04em; color:var(--ink-soft);
    margin:0 0 20px;
  }
  .hero .lede{font-size:1.05rem; color:var(--ink-soft); max-width:54ch; margin:0 0 24px;}
  .portrait{
    width:170px; height:212px; object-fit:cover; border-radius:10px;
    border:5px solid #fff; box-shadow:var(--shadow); background:#dde4ec;
  }
  .quicklinks{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    display:inline-flex; align-items:center; gap:8px; font-size:.86rem; font-weight:500;
    padding:7px 13px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:var(--sky-deep); box-shadow:var(--shadow);
  }
  .chip:hover{border-color:var(--sky-bright); color:var(--sky-bright); text-decoration:none; transform:translateY(-1px);}
  .chip i{font-size:.95rem; color:var(--sky);}
  .chip:hover i{color:var(--sky-bright);}

  /* stats strip */
  .stats{
    position:relative; display:flex; flex-wrap:wrap; gap:30px;
    padding:18px 0 30px; border-top:1px solid var(--line);
  }
  .stat .num{font-family:var(--serif); font-size:1.9rem; font-weight:600; color:var(--sky-deep); line-height:1;}
  .stat .lab{font-family:var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:6px;}

  /* ---------- sections ---------- */
  section{scroll-margin-top:calc(var(--nav-h) + 14px);}
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:34px 38px; margin:26px 0;
  }
  .sec-head{display:flex; align-items:baseline; gap:14px; margin:0 0 18px;}
  .sec-head h2{
    font-family:var(--serif); font-weight:600; font-size:1.7rem; color:var(--sky-deep);
    margin:0; letter-spacing:-.01em;
  }
  .sec-head .idx{font-family:var(--mono); font-size:.74rem; color:var(--horizon); letter-spacing:.1em;}
  .sec-head::after{content:""; flex:1; height:1px; background:var(--line); align-self:center;}
  .panel p{margin:0 0 14px;}
  .panel p:last-child{margin-bottom:0;}

  .subhead{
    font-family:var(--mono); font-size:.78rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--sky-deep); margin:26px 0 14px; padding-bottom:8px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .subhead .count{color:var(--muted);}

  /* about layout */
  .about-photo-wrap{display:grid; grid-template-columns:1fr; gap:0;}

  /* research */
  .research-grid{display:grid; grid-template-columns:auto 1fr; gap:28px; align-items:start;}
  .research-grid img{width:302px; max-width:100%; height:auto; border-radius:10px; border:1px solid var(--line); box-shadow:var(--shadow);}
  ul.bullets{margin:6px 0 0; padding:0; list-style:none;}
  ul.bullets li{position:relative; padding:5px 0 5px 22px; border-bottom:1px solid var(--line-soft);}
  ul.bullets li:last-child{border-bottom:none;}
  ul.bullets li::before{content:""; position:absolute; left:2px; top:13px; width:7px; height:7px; border-radius:50%; background:var(--sky); opacity:.7;}

  /* publications */
  .pub-jump{display:flex; flex-wrap:wrap; gap:8px 18px; font-family:var(--mono); font-size:.78rem; margin:4px 0 2px;}
  .pub-jump a{color:var(--ink-soft);}
  .pub-summary{display:flex; flex-wrap:wrap; gap:10px 26px; margin:2px 0 6px;}
  .pub-summary .s{font-size:.92rem; color:var(--ink-soft);}
  .pub-summary .s b{font-family:var(--mono); color:var(--sky-deep); font-weight:600;}

  ol.pubs{list-style:none; margin:0; padding:0;}
  ol.pubs li{
    display:grid; grid-template-columns:64px 1fr; gap:16px; align-items:start;
    padding:14px 14px 14px 0; border-bottom:1px solid var(--line-soft);
  }
  ol.pubs li:last-child{border-bottom:none;}
  .tag{
    font-family:var(--mono); font-size:.74rem; font-weight:500; color:var(--sky-deep);
    background:var(--line-soft); border:1px solid var(--line); border-radius:6px;
    padding:3px 0; text-align:center; letter-spacing:.02em;
  }
  .cite{font-size:.96rem; color:var(--ink); line-height:1.55;}
  .cite i{color:var(--ink-soft);}
  /* status accents — applied only to in-press / under-review items */
  li.st-accepted{background:linear-gradient(90deg, rgba(185,116,43,.06), transparent 40%); border-left:3px solid var(--horizon); padding-left:13px; border-radius:6px;}
  li.st-accepted .tag{background:rgba(185,116,43,.12); border-color:rgba(185,116,43,.4); color:#8a531c;}
  li.st-review{background:linear-gradient(90deg, rgba(91,107,125,.07), transparent 40%); border-left:3px solid var(--slate); padding-left:13px; border-radius:6px;}
  li.st-review .tag{background:rgba(91,107,125,.12); border-color:rgba(91,107,125,.4); color:#475260;}

  /* teaching */
  .teach-grid{display:grid; grid-template-columns:1fr 1fr; gap:30px;}

  /* talks */
  ol.talks{list-style:none; margin:0; padding:0;}
  ol.talks li{padding:13px 0; border-bottom:1px solid var(--line-soft);}
  ol.talks li:last-child{border-bottom:none;}
  .talk-kind{
    font-family:var(--mono); font-size:.7rem; letter-spacing:.06em; text-transform:uppercase;
    color:#fff; background:var(--sky-deep); padding:2px 8px; border-radius:5px; margin-right:8px;
    display:inline-block; vertical-align:1px;
  }

  /* news */
  ul.news{list-style:none; margin:0; padding:0;}
  ul.news li{display:grid; grid-template-columns:130px 1fr; gap:16px; padding:12px 0; border-bottom:1px solid var(--line-soft);}
  ul.news li:last-child{border-bottom:none;}
  .news-date{font-family:var(--mono); font-size:.78rem; color:var(--horizon);}

  /* media / contact */
  ul.plain{list-style:none; margin:0; padding:0;}
  ul.plain li{padding:8px 0;}
  .contact-links{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;}

  /* footer */
  footer{
    background:var(--sky-deep); color:#cdd9e6; text-align:center; padding:26px 0; margin-top:30px;
    font-size:.9rem;
  }
  footer .updated{font-family:var(--mono); font-size:.76rem; color:#9db4cb;}

  /* back to top */
  #toTop{
    position:fixed; right:20px; bottom:20px; width:44px; height:44px; border-radius:50%;
    background:var(--sky-deep); color:#fff; border:none; cursor:pointer; box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; font-size:1rem; z-index:60;
  }
  #toTop.show{opacity:1; pointer-events:auto;}
  #toTop:hover{background:var(--sky-bright);}

  /* ---------- responsive ---------- */
  @media (max-width:860px){
    .hero-grid{grid-template-columns:1fr; gap:26px;}
    .portrait{width:140px; height:174px;}
    .research-grid{grid-template-columns:1fr;}
    .research-grid img{width:100%; max-width:360px;}
    .teach-grid{grid-template-columns:1fr; gap:8px;}
    .nav-toggle{display:block;}
    .nav-links{
      position:absolute; top:var(--nav-h); left:0; right:0; flex-direction:column; gap:0;
      background:#fff; border-bottom:1px solid var(--line); padding:6px 14px 12px;
      box-shadow:var(--shadow); display:none;
    }
    .nav-links.open{display:flex;}
    .nav-links a{padding:11px 8px;}
    .nav-links a.active::after{left:8px; right:auto; width:18px;}
    .panel{padding:24px 20px;}
    ul.news li{grid-template-columns:1fr; gap:2px;}
    ol.pubs li{grid-template-columns:54px 1fr; gap:12px;}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    #toTop{transition:none;}
    .chip:hover{transform:none;}
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <div class="nav-name"><a href="#top" id="navName"></a></div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><i class="fa-solid fa-bars"></i></button>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="#top">Main</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#research">Research</a></li>
        <li><a href="#publications">Publications</a></li>
        <li><a href="#teaching">Teaching</a></li>
        <li><a href="#talks">Talks</a></li>
        <li><a href="#media">Media</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<a id="top"></a>
<section class="hero">
  <div class="wrap">
    <div class="hero-grid">
      <div>
        <p class="eyebrow">Researcher &middot; Assistant Professor</p>
        <h1 id="heroName"></h1>
        <p class="tagline" id="heroTagline"></p>
        <p class="lede" id="heroWelcome"></p>
        <div class="quicklinks" id="heroLinks"></div>
      </div>
      <img class="portrait" id="heroPhoto" alt="Portrait of Metin Ozturk">
    </div>
    <div class="stats" id="heroStats"></div>
  </div>
</section>

<main class="wrap" id="main"></main>

<footer>
  <div class="wrap">
    <p id="copyright"></p>
    <p class="updated" id="updated"></p>
  </div>
</footer>

<button id="toTop" aria-label="Back to top"><i class="fa-solid fa-arrow-up"></i></button>

<script src="content.js"></script>
<script>
(function(){
  const S = window.SITE || SITE;
  const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
  const $ = id => document.getElementById(id);

  /* ----- header / hero ----- */
  $('navName').textContent = S.name.split(',')[0];
  $('heroName').textContent = S.name;
  $('heroTagline').textContent = S.tagline;
  $('heroWelcome').textContent = S.welcome;
  $('heroPhoto').src = S.photo;

  const linkDefs = [
    ['email',  'fa-solid fa-envelope',      'Email',          'mailto:'+S.email],
    ['scholar','fa-solid fa-graduation-cap','Google Scholar', S.links.scholar],
    ['linkedin','fa-brands fa-linkedin',    'LinkedIn',       S.links.linkedin],
    ['twitter','fa-brands fa-x-twitter',    'X / Twitter',    S.links.twitter],
    ['rg',     'fa-brands fa-researchgate', 'ResearchGate',   S.links.researchgate],
  ];
  const hl = $('heroLinks');
  linkDefs.forEach(([k,icon,label,href])=>{
    if(!href) return;
    const a = el('a','chip',`<i class="${icon}"></i>${label}`);
    a.href = href;
    if(k!=='email'){ a.target='_blank'; a.rel='noopener'; }
    hl.appendChild(a);
  });

  /* ----- stats ----- */
  const nJ=S.journals.length, nC=S.conferences.length, nB=S.bookChapters.length;
  const stats = [
    [nJ+nC+nB, 'Research items'],
    [nJ, 'Journal papers'],
    [nC, 'Conference papers'],
    [nB, 'Book chapters'],
  ];
  const hs = $('heroStats');
  stats.forEach(([n,l])=>{
    const d = el('div','stat'); d.appendChild(el('div','num',n)); d.appendChild(el('div','lab',l)); hs.appendChild(d);
  });

  /* ----- helpers ----- */
  const main = $('main');
  function section(id, idx, title){
    const s = el('section'); s.id = id;
    const p = el('div','panel');
    const head = el('div','sec-head');
    head.appendChild(el('span','idx',idx));
    head.appendChild(el('h2',null,title));
    p.appendChild(head);
    s.appendChild(p);
    main.appendChild(s);
    return p; // append content into the panel
  }
  function pubList(items){
    const ol = el('ol','pubs');
    items.forEach(it=>{
      const li = el('li', it.status ? ('st-'+it.status) : null);
      li.appendChild(el('span','tag', it.id));
      li.appendChild(el('div','cite', it.cite));
      ol.appendChild(li);
    });
    return ol;
  }

  /* ----- ABOUT ----- */
  (function(){
    const p = section('about','01','About');
    S.about.forEach(par => p.appendChild(el('p',null,par)));
  })();

  /* ----- RESEARCH ----- */
  (function(){
    const p = section('research','02','Research');
    const grid = el('div','research-grid');
    if(S.researchImage){
      const img = el('img'); img.src = S.researchImage; img.alt='Research system model'; grid.appendChild(img);
    }
    const col = el('div');
    col.appendChild(el('p',null,S.researchIntro));
    const ul = el('ul','bullets');
    S.researchInterests.forEach(r => ul.appendChild(el('li',null,r)));
    col.appendChild(ul);
    grid.appendChild(col);
    p.appendChild(grid);
  })();

  /* ----- PUBLICATIONS ----- */
  (function(){
    const p = section('publications','03','Publications');
    const total = nJ+nC+nB;
    p.appendChild(el('p',null,`<b>Total:</b> ${total} research items.`));

    const sum = el('div','pub-summary');
    sum.appendChild(el('span','s',`<b>${nJ}</b> journal papers — ${S.pubNotes.journals}`));
    sum.appendChild(el('span','s',`<b>${nC}</b> conference papers — ${S.pubNotes.conferences}`));
    sum.appendChild(el('span','s',`<b>${nB}</b> book chapters — ${S.pubNotes.bookChapters}`));
    p.appendChild(sum);

    const jump = el('div','pub-jump',
      `Jump to: <a href="#pub-journals">Journals</a> &middot; <a href="#pub-conf">Conference Proceedings</a> &middot; <a href="#pub-book">Book Chapters</a>`);
    p.appendChild(jump);

    const sh1 = el('div','subhead'); sh1.id='pub-journals';
    sh1.appendChild(el('span',null,'Journal Publications'));
    sh1.appendChild(el('span','count',`${nJ} items`));
    p.appendChild(sh1);
    p.appendChild(pubList(S.journals));

    const sh2 = el('div','subhead'); sh2.id='pub-conf';
    sh2.appendChild(el('span',null,'Conference Proceedings'));
    sh2.appendChild(el('span','count',`${nC} items · peer reviewed, full-paper`));
    p.appendChild(sh2);
    p.appendChild(pubList(S.conferences));

    const sh3 = el('div','subhead'); sh3.id='pub-book';
    sh3.appendChild(el('span',null,'Book Chapters'));
    sh3.appendChild(el('span','count',`${nB} items`));
    p.appendChild(sh3);
    p.appendChild(pubList(S.bookChapters));
  })();

  /* ----- TEACHING ----- */
  (function(){
    const p = section('teaching','04','Teaching');
    p.appendChild(el('p',null,S.teachingIntro));
    const grid = el('div','teach-grid');
    [['Graduate-Level Courses',S.gradCourses],['Undergraduate-Level Courses',S.undergradCourses]].forEach(([title,list])=>{
      const col = el('div');
      col.appendChild(el('div','subhead',title));
      const ul = el('ul','bullets');
      list.forEach(c => ul.appendChild(el('li',null,c)));
      col.appendChild(ul);
      grid.appendChild(col);
    });
    p.appendChild(grid);
  })();

  /* ----- TALKS ----- */
  (function(){
    const p = section('talks','05','Talks & Seminars');
    const ol = el('ol','talks');
    S.talks.forEach(t=>{
      const li = el('li');
      li.innerHTML = `<span class="talk-kind">${t.kind}</span>${t.body}`;
      ol.appendChild(li);
    });
    p.appendChild(ol);
  })();

  /* ----- NEWS (announcements) — placed as its own top panel above About? kept under Main flow ----- */
  // (Announcements are rendered into a dedicated panel right after the hero.)

  /* ----- MEDIA ----- */
  (function(){
    const p = section('media','06','Media Coverage');
    const ul = el('ul','bullets');
    S.media.forEach(m => ul.appendChild(el('li',null,m)));
    p.appendChild(ul);
  })();

  /* ----- BLOG ----- */
  (function(){
    const p = section('blog','07','Blog Articles');
    p.appendChild(el('p',null,S.blog));
  })();

  /* ----- CONTACT ----- */
  (function(){
    const p = section('contact','08','Contact');
    p.appendChild(el('p',null,`Feel free to reach out via email: <b><a href="mailto:${S.email}">${S.email}</a></b>`));
    p.appendChild(el('p',null,`Or, I am also on social media!`));
    const row = el('div','contact-links');
    [
      ['fa-brands fa-linkedin','LinkedIn',S.links.linkedin],
      ['fa-brands fa-x-twitter','X / Twitter',S.links.twitter],
      ['fa-solid fa-graduation-cap','Google Scholar',S.links.scholar],
      ['fa-brands fa-researchgate','ResearchGate',S.links.researchgate],
    ].forEach(([icon,label,href])=>{
      if(!href) return;
      const a = el('a','chip',`<i class="${icon}"></i>${label}`);
      a.href=href; a.target='_blank'; a.rel='noopener';
      row.appendChild(a);
    });
    p.appendChild(row);
  })();

  /* ----- ANNOUNCEMENTS: insert a News panel right after the hero (before About) ----- */
  (function(){
    if(!S.announcements || !S.announcements.length) return;
    const s = el('section'); s.id='news';
    const p = el('div','panel');
    const head = el('div','sec-head');
    head.appendChild(el('span','idx','00'));
    head.appendChild(el('h2',null,'News'));
    p.appendChild(head);
    const ul = el('ul','news');
    S.announcements.forEach(a=>{
      const li = el('li');
      li.appendChild(el('span','news-date',a.date));
      li.appendChild(el('div',null,a.body));
      ul.appendChild(li);
    });
    p.appendChild(ul); s.appendChild(p);
    main.insertBefore(s, main.firstChild);
  })();

  /* ----- footer ----- */
  $('copyright').innerHTML = `&copy; ${S.copyrightYear} ${S.name.split(',')[0]}`;
  $('updated').textContent = `Last updated on ${S.lastUpdated}`;

  /* ----- mobile nav ----- */
  const toggle = $('navToggle'), links = $('navLinks');
  toggle.addEventListener('click', ()=>{
    const open = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
  });
  links.addEventListener('click', e=>{ if(e.target.tagName==='A') links.classList.remove('open'); });

  /* ----- scrollspy ----- */
  const navMap = {};
  links.querySelectorAll('a').forEach(a=>{ navMap[a.getAttribute('href').slice(1)] = a; });
  if('IntersectionObserver' in window){
  const spy = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        Object.values(navMap).forEach(a=>a.classList.remove('active'));
        const a = navMap[en.target.id];
        if(a) a.classList.add('active');
      }
    });
  }, {rootMargin:`-${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h'))+20}px 0px -70% 0px`});
  document.querySelectorAll('main section, #top').forEach(s=>{ if(s.id) spy.observe(s); });
  }

  /* ----- back to top ----- */
  const toTop = $('toTop');
  window.addEventListener('scroll', ()=>{ toTop.classList.toggle('show', window.scrollY>600); }, {passive:true});
  toTop.addEventListener('click', ()=>window.scrollTo({top:0, behavior:'smooth'}));
})();
</script>
</body>
</html>
